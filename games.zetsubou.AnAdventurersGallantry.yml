app-id: games.zetsubou.AnAdventurersGallantry
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: AAG.sh
tags:
  - proprietary
finish-args:
  - --share=ipc
  - --socket=x11
  - --device=dri
  - --socket=pulseaudio
  - --persist=.renpy
modules:
  - name: hmp
    buildsystem: simple
    build-commands:
      - mkdir -p /app/bin/
      - cp -R * /app/bin/
      - install -Dm644 -t "/app/share/metainfo/" games.zetsubou.AnAdventurersGallantry.metainfo.xml
      - install -Dm644 -t "/app/share/applications/" games.zetsubou.AnAdventurersGallantry.desktop
      - install -Dm644 games.zetsubou.AnAdventurersGallantry.png "/app/share/icons/hicolor/512x512/apps/games.zetsubou.AnAdventurersGallantry.png"
    sources:
      - type: archive
        url: https://gitlab.com/zetsubougames-builds/an-adventurers-gallantry/-/releases/v1.1.1/downloads/an-adventurers-gallantry-linux-amd64.zip
        sha512: 767e00ca1bd27513e040ffd8afbfba0a33788e4fb9a0849ac8ae668a0b5f7a56bb9feb4a654965e159035d8f22319d8d8e1bf52ac4f1945d2601ba464b9223ed
        only-arches:
          - x86_64
      - type: archive
        url: https://gitlab.com/zetsubougames-builds/an-adventurers-gallantry/-/releases/v1.1.1/downloads/an-adventurers-gallantry-linux-aarch64.zip
        sha512: 229d570f1b109e20d92bace6e8e5f53510e8e425c887c68614259e196aa24a2c1a739120e7516dc00d019484e1a2e6c38ccc4a694dcad09aec0abeaebfee444f
        only-arches:
          - aarch64
      - type: file
        path: games.zetsubou.AnAdventurersGallantry.desktop
      - type: file
        path: games.zetsubou.AnAdventurersGallantry.png
      - type: file
        path: games.zetsubou.AnAdventurersGallantry.metainfo.xml
